<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AI信頼度分析</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e1e2e;
      --surface: #313244;
      --border: #45475a;
      --text: #cdd6f4;
      --subtext: #a6adc8;
      --green: #a6e3a1;
      --blue: #89b4fa;
      --yellow: #f9e2af;
      --red: #f38ba8;
      --accent: #89b4fa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      min-height: 100dvh;
      padding: 20px 16px 40px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--subtext);
      margin-bottom: 24px;
    }

    /* ===== APIキー設定 ===== */
    details {
      background: var(--surface);
      border-radius: 10px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    summary {
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    summary::-webkit-details-marker { display: none; }

    .summary-arrow {
      margin-left: auto;
      font-size: 12px;
      color: var(--subtext);
      transition: transform 0.2s;
    }

    details[open] .summary-arrow { transform: rotate(90deg); }

    .key-body {
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .key-status {
      font-size: 12px;
      color: var(--subtext);
    }

    .key-status.set { color: var(--green); }

    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }

    input::placeholder { color: var(--subtext); }

    /* ===== ボタン ===== */
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:active { opacity: 0.75; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* ===== テキストエリア ===== */
    textarea {
      width: 100%;
      min-height: 180px;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      resize: vertical;
      margin-bottom: 12px;
    }

    textarea::placeholder { color: var(--subtext); }

    .char-count {
      font-size: 12px;
      color: var(--subtext);
      text-align: right;
      margin-top: -8px;
      margin-bottom: 14px;
    }

    /* ===== 結果 ===== */
    #result {
      margin-top: 20px;
      border-radius: 12px;
      overflow: hidden;
    }

    .result-loading {
      background: var(--surface);
      padding: 20px;
      text-align: center;
      font-size: 14px;
      color: var(--subtext);
    }

    .result-card {
      background: var(--surface);
      padding: 20px;
    }

    .result-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .result-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    .result-score {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }

    .result-advice {
      font-size: 13px;
      color: var(--subtext);
      margin-left: auto;
      text-align: right;
      max-width: 140px;
    }

    .meter-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .meter-label {
      font-size: 11px;
      color: var(--subtext);
      flex-shrink: 0;
    }

    .meter-track {
      flex: 1;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .result-error {
      background: var(--surface);
      padding: 20px;
      font-size: 14px;
      color: var(--red);
      border-left: 3px solid var(--red);
    }

    /* ===== スピナー ===== */
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
  </style>
</head>
<body>

  <h1>AI信頼度分析</h1>
  <p class="subtitle">会話をまるごとペーストして信頼度を分析</p>

  <!-- APIキー設定 -->
  <details id="keySection">
    <summary>
      ⚙️ APIキー設定
      <span class="summary-arrow">›</span>
    </summary>
    <div class="key-body">
      <div class="key-status" id="keyStatus">未設定</div>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." autocomplete="off">
      <button class="btn btn-secondary" onclick="saveKey()">保存する</button>
    </div>
  </details>

  <!-- メイン -->
  <textarea id="textInput" placeholder="あなたの質問とClaudeの返答をまとめてここに貼り付け..." oninput="updateCount()"></textarea>
  <div class="char-count"><span id="charCount">0</span> 文字</div>

  <button class="btn btn-primary" id="analyzeBtn" onclick="analyze()">分析する</button>

  <div id="result"></div>

  <script>
    const STORAGE_KEY = "tone_analyzer_api_key";

    // ===== APIキー管理 =====

    function loadKey() {
      const key = localStorage.getItem(STORAGE_KEY) || "";
      const input = document.getElementById("apiKeyInput");
      const status = document.getElementById("keyStatus");
      if (key) {
        input.value = key;
        status.textContent = "✓ 設定済み（" + key.slice(0, 12) + "...）";
        status.className = "key-status set";
      } else {
        status.textContent = "未設定";
        status.className = "key-status";
        document.getElementById("keySection").open = true;
      }
    }

    function saveKey() {
      const key = document.getElementById("apiKeyInput").value.trim();
      if (!key) return;
      localStorage.setItem(STORAGE_KEY, key);
      loadKey();
      document.getElementById("keySection").open = false;
    }

    // ===== 文字数カウント =====

    function updateCount() {
      const len = document.getElementById("textInput").value.length;
      document.getElementById("charCount").textContent = len;
    }

    // ===== スコア → 色 =====

    function scoreToColor(score) {
      if (score >= 80) return "#22c55e";
      if (score >= 60) return "#3b82f6";
      if (score >= 40) return "#f59e0b";
      return "#ef4444";
    }

    // ===== 分析 =====

    async function analyze() {
      const text = document.getElementById("textInput").value.trim();
      const apiKey = localStorage.getItem(STORAGE_KEY);
      const resultEl = document.getElementById("result");
      const btn = document.getElementById("analyzeBtn");

      if (!apiKey) {
        document.getElementById("keySection").open = true;
        return;
      }
      if (text.length < 50) {
        resultEl.innerHTML = `<div class="result-error">テキストが短すぎます（50文字以上必要）</div>`;
        return;
      }

      btn.disabled = true;
      resultEl.innerHTML = `<div class="result-loading"><span class="spinner"></span>分析中...</div>`;

      try {
        const result = await callClaudeAPI(apiKey, text);

        if (result.score === -1) {
          resultEl.innerHTML = `<div class="result-card" style="color:var(--subtext);font-size:14px;">この返答は採点対象外（雑談・相槌）です</div>`;
        } else {
          const color = scoreToColor(result.score);
          resultEl.innerHTML = `
            <div class="result-card">
              <div class="result-top">
                <span class="result-badge" style="background:${color}">${result.label}</span>
                <span class="result-score" style="color:${color}">${result.score}</span>
                <span class="result-advice">${result.advice}</span>
              </div>
              <div class="meter-wrap">
                <span class="meter-label">低</span>
                <div class="meter-track">
                  <div class="meter-fill" style="width:0%;background:${color}" id="meterFill"></div>
                </div>
                <span class="meter-label">高</span>
              </div>
            </div>
          `;
          // アニメーション
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              const fill = document.getElementById("meterFill");
              if (fill) fill.style.width = result.score + "%";
            });
          });
        }
      } catch (e) {
        resultEl.innerHTML = `<div class="result-error">エラー: ${e.message}</div>`;
      } finally {
        btn.disabled = false;
      }
    }

    async function callClaudeAPI(apiKey, text) {
      const truncated = text.slice(0, 2000);

      const prompt = `以下はユーザーとAIの会話です。ユーザーの質問の内容・重さ・文脈を考慮したうえで、AIの返答の信頼度を採点してください。

【ステップ1: AIの返答の種類を判定】
- factual: 事実・情報・説明を含む返答（科学的説明、データ、歴史的事実など）
- opinion: 意見・評価・アドバイスを含む返答
- conversational: 相槌・雑談・感情的な反応・質問のみの返答

【ステップ2: 質問の文脈を加味した採点基準】

factualの場合：
- 90〜100: 根拠の論理的な強さが主張を十分に支えている
- 70〜89: 根拠はあるが主張を完全には支えきれていない
- 50〜69: 根拠が弱いか不十分
- 0〜49: 根拠がない、または誤情報

opinionの場合：
- 90〜100: 意見の根拠が明確で、質問の重さに対して適切な慎重さがある
- 70〜89: 意見はあるが根拠が薄い、またはやや忖度がある
- 50〜69: 根拠なしの意見、または明らかに相手に合わせている
- 0〜49: 誤った前提に基づく意見、または完全な忖度

※ 健康・法律・お金・重要な意思決定など、リスクの高い質問に対して根拠なく断言している場合はスコアを大きく下げること。

conversationalの場合：
- 採点対象外。scoreは-1を返す。

必ず以下のJSON形式のみで返答してください（他のテキスト不要）：
{"type": "factual", "score": 75, "label": "やや信頼できる", "advice": "根拠は示されているが一部確認が必要"}

score: 0〜100、または採点対象外なら-1
label: 「信頼できる」「やや信頼できる」「注意が必要」「要確認」「採点対象外」のどれか
advice: 25文字以内

会話：
"""
${truncated}
"""`;

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "content-type": "application/json",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 150,
          messages: [{ role: "user", content: prompt }],
        }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || `APIエラー: ${response.status}`);
      }

      const data = await response.json();
      const raw = data.content[0].text.trim();
      const match = raw.match(/\{[^}]+\}/);
      if (!match) throw new Error("レスポンス解析失敗");
      return JSON.parse(match[0]);
    }

    // ===== 初期化 =====
    loadKey();
  </script>
</body>
</html>
